name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Run tests and coverage
        run: |
          go test -v -coverprofile=coverage.txt -covermode=atomic ./...
